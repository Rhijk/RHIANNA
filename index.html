<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rhianna Jane Kidd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #F3F0EA;
      --ink: #111111;
      --muted: #67615A;
      --line: #1A1A1A;
      --panel: #DED8CF;
      --accent: #7E2D3A;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(to right, rgba(17,17,17,0.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(17,17,17,0.045) 1px, transparent 1px),
        var(--bg);
      background-size: 48px 48px;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
    }

    .rail {
      border-right: 1px solid var(--line);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 28px 0;
    }

    .rail span {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 36px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .availability {
      color: var(--muted);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
      min-height: 0;
    }

    .copy {
      padding: clamp(40px, 7vw, 96px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 28px;
      font-size: 13px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(58px, 9vw, 128px);
      line-height: 0.86;
      letter-spacing: -0.075em;
      font-weight: 600;
    }

    .deck {
      margin-top: 38px;
      max-width: 560px;
      display: grid;
      gap: 16px;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.28;
    }

    .deck p {
      margin: 0;
    }

    .deck .muted {
      color: var(--muted);
      font-size: 0.82em;
      line-height: 1.55;
      max-width: 460px;
    }

    .image-panel {
      background: var(--panel);
      position: relative;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
    }

    .image-panel::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(17,17,17,0.35);
      pointer-events: none;
      z-index: 2;
    }

    .image-panel img {
      width: 100%;
      height: 100%;
      min-height: 520px;
      object-fit: cover;
      object-position: center;
    }

    footer {
      padding: 24px 36px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      font-size: 14px;
    }

    .links {
      display: flex;
      gap: 22px;
    }

    .links a {
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
    }

    .footer-note {
      color: var(--muted);
    }

    @media (max-width: 880px) {
      .site {
        grid-template-columns: 1fr;
      }

      .rail {
        display: none;
      }

      header {
        padding: 22px;
        gap: 20px;
        align-items: flex-start;
      }

      .availability {
        text-align: right;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .copy {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 52px 24px;
      }

      h1 {
        font-size: clamp(58px, 18vw, 92px);
      }

      .image-panel {
        min-height: 420px;
      }

      .image-panel img {
        min-height: 300px;
      }

      footer {
        padding: 22px;
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="site">
    <aside class="rail">
      <span>Rhianna Jane Kidd</span>
    </aside>

    <main class="main">
      <header>
        <a href="/">RHIANNA.CA</a>
        <span class="availability">Operations / Executive Support</span>
      </header>

      <section class="hero">
        <div class="copy">
          <p class="eyebrow">Internal systems · priorities · execution</p>

          <h1>Rhianna<br>Jane Kidd</h1>

          <div class="deck">
            <p>Operations, project management, workflows.</p>
            <p class="muted">Ambiguity into structure.</p>
          </div>
        </div>

        <div class="image-panel">
          <img src="./RKidd.png" alt="Rhianna Jane Kidd">
        </div>
      </section>

      <footer>
        <div class="links">
          <a href="mailto:rhianna.kidd@gmail.com">Email</a>
          <a href="https://www.linkedin.com/in/rhianna-kidd/" target="_blank" rel="noopener">LinkedIn</a>
        </div>

        <div class="footer-note">Complex problems —> simple solutions.</div>
      </footer>
    </main>
  </div>
</body>
</html>
