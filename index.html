<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rhianna Jane Kidd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #F7F3EA;
      --ink: #171411;
      --muted: #6E675E;
      --card: #EFE5D6;
      --accent: #B34A38;
      --soft: #D9C7B2;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      padding: 28px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header a {
      font-weight: 600;
    }

    .tag {
      color: var(--muted);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: clamp(36px, 6vw, 90px);
      align-items: center;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 56px 0;
    }

    .copy {
      max-width: 720px;
    }

    .kicker {
      display: inline-block;
      margin-bottom: 24px;
      padding: 8px 12px;
      background: var(--card);
      border-radius: 999px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    h1 {
      margin: 0;
      font-size: clamp(54px, 8.5vw, 118px);
      line-height: 0.92;
      letter-spacing: -0.065em;
      font-weight: 650;
    }

    .intro {
      margin-top: 32px;
      max-width: 560px;
      font-size: clamp(20px, 2.3vw, 30px);
      line-height: 1.18;
      letter-spacing: -0.025em;
    }

    .statement {
      margin-top: 18px;
      max-width: 520px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .photo-wrap {
      position: relative;
      justify-self: center;
      width: min(100%, 430px);
    }

    .photo-bg {
      position: absolute;
      inset: 28px -24px -24px 28px;
      background: var(--soft);
      border-radius: 28px;
      z-index: 0;
    }

    .photo-wrap img {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: center;
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(50, 38, 24, 0.18);
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .links {
      display: flex;
      gap: 18px;
    }

    .links a {
      color: var(--ink);
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
    }

    @media (max-width: 850px) {
      .page {
        padding: 22px;
      }

      header {
        align-items: flex-start;
        gap: 20px;
      }

      .tag {
        text-align: right;
      }

      main {
        grid-template-columns: 1fr;
        padding: 42px 0;
      }

      .photo-wrap {
        justify-self: start;
        max-width: 320px;
        order: -1;
      }

      .intro {
        font-size: 22px;
      }

      footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a href="/">RHIANNA.CA</a>
      <span class="tag">Operations / Executive Support</span>
    </header>

    <main>
      <section class="copy">
        <div class="kicker">Internal systems · priorities · execution</div>

        <h1>Rhianna<br>Jane Kidd</h1>

        <div class="intro">
          Operations, executive support, and follow-through.
        </div>

        <div class="statement">
          I turn ambiguous work into structured execution.
        </div>
      </section>

      <section class="photo-wrap">
        <div class="photo-bg"></div>
        <img src="./RKidd.png" alt="Rhianna Jane Kidd">
      </section>
    </main>

    <footer>
      <div class="links">
        <a href="mailto:rhianna.kidd@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/rhianna-kidd/" target="_blank" rel="noopener">LinkedIn</a>
      </div>

      <div>Complex work, made simple.</div>
    </footer>
  </div>
</body>
</html>
