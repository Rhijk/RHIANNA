<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rhianna Jane Kidd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #F5F3EF;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 80px;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(48px, 7vw, 92px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 500;
    }

    .role {
      margin: 0 0 18px;
      font-size: 20px;
      color: #222222;
    }

    .statement {
      margin: 0;
      font-size: 17px;
      color: #5E5A54;
    }

    .portrait {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      filter: grayscale(100%);
    }

    footer {
      display: flex;
      gap: 24px;
      font-size: 13px;
    }

    footer a {
      color: #111111;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }

    @media (max-width: 800px) {
      main {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .portrait {
        max-width: 280px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <span>RHIANNA.CA</span>
      <span>Operations / Executive Support</span>
    </header>

    <main>
      <div>
        <h1>Rhianna Jane Kidd</h1>
        <p class="role">Operations, executive support.</p>
        <p class="statement">I turn ambiguous work into structured execution.</p>
      </div>

      <img class="portrait" src="./RKidd.png" alt="Rhianna Jane Kidd">
    </main>

    <footer>
      <a href="mailto:rhianna.kidd@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/rhianna-kidd/" target="_blank">LinkedIn</a>
    </footer>
  </div>
</body>
</html>
